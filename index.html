<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }
body { background: #F3F4F6; }

.app { max-width: 450px; margin: auto; padding: 16px; }

.header {
  background: #4F46E5;
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 16px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4F46E5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover { background: #4338CA; }

.expense-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.section-title { font-weight: bold; margin-bottom: 10px; }
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h2>Expense Tracker</h2>
  <p>Session Based App</p>
</div>

<!-- LOGIN -->
<div id="loginPage" class="card">
  <div class="section-title">Login / Register</div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="result"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="card">
    <div class="section-title">Total Spent</div>
    <h2 id="total">₹0</h2>
  </div>

  <div class="card">
    <div class="section-title">Add Expense</div>

    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">

    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Other</option>
    </select>

    <input id="date" type="date">

    <button onclick="addExpense()">Add Expense</button>
  </div>

  <div class="card">
    <div class="section-title">Expenses</div>
    <div id="list"></div>
  </div>

</div>

</div>

<script>

const BASE_URL = "https://expense-tracker-backend-mmug.onrender.com/api";

// 🔥 SESSION STATE (RESET EVERY LOGIN)
let expenses = [];
let total = 0;

// default date
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];
});


// REGISTER (unchanged)
async function register() {
  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: "User",
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  result.innerText = data.message || data.error;
}


// LOGIN (🔥 RESET EVERYTHING HERE)
async function login() {

  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  result.innerText = data.message || data.error;

  if (res.ok) {

    // 🔥 SWITCH UI
    loginPage.style.display = "none";
    dashboard.style.display = "block";

    // 🔥 RESET SESSION DATA
    expenses = [];
    total = 0;

    render();
  }
}


// ADD EXPENSE (SESSION ONLY)
async function addExpense() {

  const amountVal = Number(amount.value);

  const newExpense = {
    desc: desc.value,
    amount: amountVal,
    category: category.value,
    date: date.value
  };

  expenses.push(newExpense);

  total += amountVal;

  render();

  // clear inputs
  desc.value = "";
  amount.value = "";

  result.innerText = "✅ Expense Added";

  // 🔥 SNS ALERT (ONLY WHEN LIMIT EXCEEDS)
  if (total > 5000) {
    fetch(`${BASE_URL}/alert-sms`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ total })
    });
  }
}


// RENDER UI
function render() {

  document.getElementById("total").innerText = "₹" + total;

  document.getElementById("list").innerHTML =
    expenses.map((e, i) => `
      <div class="expense-item">
        <div>
          <b>${e.desc}</b><br>
          <small>${e.category} | ${e.date}</small>
        </div>
        <div>
          ₹${e.amount}
        </div>
      </div>
    `).join("");
}

</script>

</body>
</html>
