<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #F3F4F6; min-height: 100vh; }
    .app { max-width: 420px; margin: 0 auto; padding: 16px; }
    .header { background: #4F46E5; color: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
    .header h1 { font-size: 20px; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .card { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { font-size: 13px; color: #6B7280; display: block; margin-bottom: 4px; margin-top: 10px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; }
    .add-btn { width: 100%; margin-top: 14px; background: #4F46E5; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .add-btn:hover { background: #4338CA; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat { background: #F9FAFB; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-label { font-size: 12px; color: #6B7280; }
    .stat-value { font-size: 20px; font-weight: 600; color: #111827; margin-top: 2px; }
    .alert { background: #FEF3C7; border: 1px solid #F59E0B; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; color: #92400E; display: none; }
    .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F3F4F6; }
    .expense-item:last-child { border-bottom: none; }
    .expense-name { font-size: 14px; color: #111827; }
    .expense-cat { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
    .expense-amount { font-size: 14px; font-weight: 600; color: #4F46E5; }
    .delete-btn { background: none; border: none; color: #9CA3AF; cursor: pointer; font-size: 18px; margin-left: 8px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: #6B7280; width: 80px; text-align: right; }
    .bar-track { flex: 1; background: #F3F4F6; border-radius: 4px; height: 14px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .bar-val { font-size: 12px; color: #6B7280; width: 60px; }
    .empty { text-align: center; color: #9CA3AF; font-size: 13px; padding: 20px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Expense Tracker</h1>
    <p>Track your daily spending</p>
  </div>

  <div class="card">
    <h2>Add Expense</h2>
    <label>Description</label>
    <input type="text" id="desc" placeholder="e.g. Lunch, Bus ticket..." />
    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="0" min="0" />
    <label>Category</label>
    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Entertainment</option>
      <option>Health</option>
      <option>Education</option>
      <option>Other</option>
    </select>
    <label>Date</label>
    <input type="date" id="date" />
    <button class="add-btn" onclick="addExpense()">+ Add Expense</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value" id="total">₹0</div>
    </div>
    <div class="stat">
      <div class="stat-label">No. of Expenses</div>
      <div class="stat-value" id="count">0</div>
    </div>
  </div>

  <div class="alert" id="alert-box">
    ⚠ You are spending too much on <span id="alert-cat"></span>!
  </div>

  <div class="card">
    <h2>Spending by Category</h2>
    <div id="chart-area"><div class="empty">No data yet</div></div>
  </div>

  <div class="card">
    <h2>Recent Expenses</h2>
    <div id="expense-list"><div class="empty">No expenses added yet</div></div>
  </div>
</div>

<script>
  let expenses = [];
document.getElementById('date').value = new Date().toISOString().split('T')[0];

const ALERT_LIMIT = 500;
const COLORS = {
  Food: '#EF4444', Transport: '#F59E0B', Shopping: '#8B5CF6',
  Entertainment: '#EC4899', Health: '#10B981', Education: '#3B82F6', Other: '#6B7280'
};

const API = 'https://expense-tracker-backend-mmug.onrender.com';

async function addExpense() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const date = document.getElementById('date').value;

  if (!desc || !amount || amount <= 0) {
    alert('Please enter valid details');
    return;
  }

  try {
    const response = await fetch(`${API}/expenses`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ desc, amount, category, date })
    });
    const newExpense = await response.json();
    expenses.push(newExpense);
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    render();
  } catch (error) {
    alert('Error saving expense: ' + error.message);
  }
}

async function deleteExpense(id) {
  try {
    await fetch(`${API}/expenses/${id}`, { method: 'DELETE' });
    expenses = expenses.filter(e => e._id !== id);
    render();
  } catch (error) {
    alert('Error deleting: ' + error.message);
  }
}

async function loadAllExpenses() {
  try {
    const response = await fetch(`${API}/expenses`);
    expenses = await response.json();
    render();
  } catch (error) {
    console.log('Error loading expenses:', error);
  }
}

function render() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('total').textContent = '₹' + total.toLocaleString('en-IN');
  document.getElementById('count').textContent = expenses.length;

  const byCategory = {};
  expenses.forEach(e => {
    byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
  });
  const maxVal = Math.max(...Object.values(byCategory), 1);

  const chartArea = document.getElementById('chart-area');
  if (Object.keys(byCategory).length === 0) {
    chartArea.innerHTML = '<div class="empty">No data yet</div>';
  } else {
    chartArea.innerHTML = Object.entries(byCategory)
      .sort((a, b) => b[1] - a[1])
      .map(([cat, val]) => `
        <div class="bar-row">
          <div class="bar-label">${cat}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(val/maxVal*100)}%;background:${COLORS[cat]||'#4F46E5'}"></div>
          </div>
          <div class="bar-val">₹${val.toLocaleString('en-IN')}</div>
        </div>`).join('');
  }

  const topCat = Object.entries(byCategory).sort((a, b) => b[1] - a[1])[0];
  const alertBox = document.getElementById('alert-box');
  if (topCat && topCat[1] > ALERT_LIMIT) {
    document.getElementById('alert-cat').textContent = topCat[0];
    alertBox.style.display = 'block';
  } else {
    alertBox.style.display = 'none';
  }

  const list = document.getElementById('expense-list');
  if (expenses.length === 0) {
    list.innerHTML = '<div class="empty">No expenses added yet</div>';
  } else {
    list.innerHTML = [...expenses].reverse().map(e => `
      <div class="expense-item">
        <div>
          <div class="expense-name">${e.desc}</div>
          <div class="expense-cat">${e.category} · ${e.date}</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="expense-amount">₹${e.amount.toLocaleString('en-IN')}</div>
          <button class="delete-btn" onclick="deleteExpense('${e._id}')">×</button>
        </div>
      </div>`).join('');
  }
}

window.onload = loadAllExpenses;
</script>
</body>
</html>
