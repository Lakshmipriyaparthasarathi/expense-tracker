<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }
body { background: #F3F4F6; }

.app { max-width: 450px; margin: auto; padding: 16px; }

.header {
  background: #4F46E5;
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 16px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4F46E5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover { background: #4338CA; }

.expense-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.section-title { font-weight: bold; margin-bottom: 10px; }
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <h2>Expense Tracker</h2>
  <p>Full Stack App</p>
</div>

<!-- LOGIN -->
<div id="loginPage" class="card">
  <div class="section-title">Login / Register</div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="result"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="card">
    <div class="section-title">Total Spent</div>
    <h2 id="total">₹0</h2>
  </div>

  <div class="card">
    <div class="section-title">Add Expense</div>

    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">

    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Other</option>
    </select>

    <input id="date" type="date">

    <button onclick="addExpense()">Add Expense</button>
  </div>

  <div class="card">

    <button onclick="resetUI()">Reset UI</button>

    <div class="section-title">Expenses</div>
    <div id="list"></div>
  </div>

</div>

</div>

<script>

const BASE_URL = "https://expense-tracker-backend-mmug.onrender.com/api";

let expenses = [];

// default date
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];
});


// REGISTER
async function register() {
  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: "Lakshmi",
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  result.innerText = data.message || data.error;
}


// LOGIN
async function login() {

  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  result.innerText = data.message || data.error;

  if (res.ok) {
    loginPage.style.display = "none";
    dashboard.style.display = "block";
    load();
  }
}


// ADD EXPENSE
async function addExpense() {

  const payload = {
    desc: desc.value,
    amount: amount.value,
    category: category.value,
    date: date.value
  };

  const res = await fetch(`${BASE_URL}/add-expense`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  await res.json();

  await load();

  desc.value = "";
  amount.value = "";

  result.innerText = "✅ Expense Added";
}


// LOAD
async function load() {
  const res = await fetch(`${BASE_URL}/expenses`);
  const data = await res.json();

  expenses = Array.isArray(data) ? data : [];
  render();
}


// DELETE
async function del(id) {
  await fetch(`${BASE_URL}/expenses/${id}`, {
    method: "DELETE"
  });

  load();
}


// RESET UI ONLY
function resetUI() {
  expenses = [];
  render();
}


// RENDER
function render() {

  let total = 0;

  document.getElementById("list").innerHTML =
    expenses.map(e => {

      const desc = e.desc || "No Description";
      const category = e.category || "Unknown";
      const date = e.date || "No Date";
      const amount = Number(e.amount) || 0;

      total += amount;

      return `
        <div class="expense-item">
          <div>
            <b>${desc}</b><br>
            <small>${category} | ${date}</small>
          </div>
          <div>
            ₹${amount}
            <button onclick="del('${e._id}')">x</button>
          </div>
        </div>
      `;
    }).join("");

  document.getElementById("total").innerText = "₹" + total;
}

</script>

</body>
</html>
